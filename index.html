<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Companion: 3:33 AM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="crosshair"></div>

    <div id="phone">
        <div style="font-size: 10px;">3:33 AM</div>
        <div id="radar"><div id="enemy-dot"></div></div>
        <div id="mode-text" style="margin-top: 5px;">MODE: STICK</div>
        <div id="battery-bar" style="height:4px; background: #0f0; margin-top:5px;"></div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>

    <div id="actions">
        <button class="ability active" id="m1">STICK</button>
        <button class="ability" id="m2">HOOK</button>
        <button class="ability" id="m3">COCOON</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
